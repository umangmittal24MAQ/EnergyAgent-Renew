data:
  # Google Sheets configuration (existing)
  grid_file: https://docs.google.com/spreadsheets/d/15B_YvZIM_ia_ZhtxwP9YB9hMZpKmwrut7JCBYSVIT-8/edit?usp=sharing
  solar_file: https://docs.google.com/spreadsheets/d/1ST7frQgyKgsvoyZI4y5tYqrJ5Ffi8p-XUgpkplAGM-Y/edit?usp=sharing
