# Energy Dashboard Configuration
# Minimal configuration for the Energy Dashboard application

# API Configuration
api:
  host: "0.0.0.0"
  port: 8000
  reload: true

# Database Configuration
database:
  url: "sqlite:///./energy_dashboard.db"

# Data Sources
data_sources:
  # SMB/Local file paths
  smb:
    enabled: true
    path: "//smb-server/energy-data"
  
  # Google Sheets
  sheets:
    enabled: false
    credentials_file: "google_credentials.json"
  
  # SharePoint
  sharepoint:
    enabled: false
    tenant_id: "your-tenant-id"
    client_id: "your-client-id"
    client_secret: "your-client-secret"

# Scheduler Configuration
scheduler:
  enabled: true
  timezone: "Asia/Kolkata"
  jobs:
    daily_report:
      cron: "10 10 * * *"
      enabled: true

# Cache Configuration
cache:
  enabled: true
  ttl: 300  # seconds

# Logging Configuration
logging:
  level: "INFO"
  format: "json"
  file: "energy_dashboard.log"

# Features
features:
  export_pdf: true
  export_excel: true
  real_time_updates: true
  dual_read: true
  dual_write: false
