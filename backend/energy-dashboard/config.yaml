# SharePoint Integration Configuration
sharepoint:
  # Enable/disable SharePoint dual-write functionality
  enabled: false
  
  # Data source priority: "google" (Google Sheets only), "sharepoint" (SharePoint only), "dual" (both)
  mode: "dual"  # dual = write to both, read from SharePoint first, fallback to Google
  
  # SharePoint site and document library URLs (to be filled in later)
  unified_solar:
    site_url: ""  # e.g., https://yourtenant.sharepoint.com/sites/EnergyData
    drive_id: ""  # Document library drive ID
    file_name: unified_solar.xlsx
  
  last_7_days:
    site_url: ""
    drive_id: ""
    file_name: last_7_days.xlsx
  
  smb_status:
    site_url: ""
    drive_id: ""
    file_name: smb_status.xlsx
  
  grid_and_diesel:
    site_url: ""
    drive_id: ""
    file_name: grid_and_diesel.xlsx
  
  master_data:
    site_url: ""
    drive_id: ""
    file_name: master_data.xlsx

costs:
  grid_per_unit_inr: 7.11
  diesel_per_unit_inr: 30.0
  solar_per_unit_inr: 0.0

solar:
  daily_target_kwh: 3000
  inverter_ids: [SMB1, SMB2, SMB3, SMB4, SMB5]

email:
